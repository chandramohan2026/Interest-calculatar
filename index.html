<body>

<div class="header">
<h2>Interest Calculator Pro</h2>
<p>Welcome, CHANDRAMOHAN SINGH 👋</p>
<p>Powered by CK2026</p>
</div>

<div class="container">

<label>From Date</label>
<input type="date" id="from">

<label>To Date</label>
<input type="date" id="to">

<label>Principal (₹)</label>
<input type="number" id="principal">

<label>Rate (Monthly %)</label>
<select id="rate">
<option value="1">1%</option>
<option value="1.5">1.5%</option>
<option value="2">2%</option>

<option value="3">3%</option>

</select>

<button onclick="calculate()">Calculate</button>
<button class="secondary" onclick="downloadPDF()">Download PDF</button>
<button class="secondary" onclick="shareWhatsApp()">WhatsApp Share</button>
<button class="secondary" onclick="saveHistory()">Save History</button>
<button id="installBtn" style="display:none;background:#2e7d32;" onclick="installApp()">📲 App Install करें</button>

<div class="result" id="result"></div>

</div>

<script>
let reportText="";
let lastCalc=null;

function inr(num){
return Number(num).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function iconCircle(inner,size){
size=size||32;
return `<div style="width:${size}px;height:${size}px;min-width:${size}px;border:2px solid #12395f;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#ffffff;">${inner}</div>`;
}

const ICONS={
clock:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#12395f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
calendar:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#12395f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
person:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#12395f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/></svg>`,
shield:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#12395f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>`,
calculator:`<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="11" x2="8" y2="11"/><line x1="12" y1="11" x2="12" y2="11"/><line x1="16" y1="11" x2="16" y2="11"/><line x1="8" y1="15" x2="8" y2="15"/><line x1="12" y1="15" x2="12" y2="15"/><line x1="16" y1="15" x2="16" y2="15"/><line x1="8" y1="19" x2="8" y2="19"/><line x1="12" y1="19" x2="12" y2="19"/><line x1="16" y1="19" x2="16" y2="19"/></svg>`,
rupee:`<span style="font-size:13px;font-weight:800;color:#12395f;">₹</span>`,
percent:`<span style="font-size:12px;font-weight:800;color:#12395f;">%</span>`
};

function calculate(){

let fromValue=document.getElementById("from").value;
let toValue=document.getElementById("to").value;
let p=parseFloat(document.getElementById("principal").value);
let r=parseFloat(document.getElementById("rate").value);

if(!fromValue || !toValue || !p){
alert("कृपया सभी जानकारी भरें");
return;
}

let from=new Date(fromValue);
let to=new Date(toValue);

let years=to.getFullYear()-from.getFullYear();
let months=to.getMonth()-from.getMonth();
let days=to.getDate()-from.getDate();

if(days<0){months--;days+=30;}
if(months<0){years--;months+=12;}

let principal = p;
let totalInterest = 0;
let yearlyData = [];

// Annual compound
for(let i=1;i<=years;i++){
 let yearInterest = principal * (r*12)/100;
 let newPrincipal = principal + yearInterest;
 yearlyData.push({year:i, principal:principal, interest:yearInterest, newPrincipal:newPrincipal});
 principal = newPrincipal;
 totalInterest += yearInterest;
}

let monthInterest = 0;
let dayInterest = 0;
let basePrincipal = principal;
if(months>0){
 monthInterest = basePrincipal * r * months /100;
}
if(days>0){
 dayInterest = basePrincipal * r * (days/30)/100;
}
principal = basePrincipal + monthInterest + dayInterest;
totalInterest += monthInterest + dayInterest;
let finalAmount = principal;

let today = new Date();
let reportDate = `${String(today.getDate()).padStart(2,'0')}-${String(today.getMonth()+1).padStart(2,'0')}-${today.getFullYear()}`;
let fromDateFormatted = `${String(from.getDate()).padStart(2,'0')}-${String(from.getMonth()+1).padStart(2,'0')}-${from.getFullYear()}`;
let toDateFormatted = `${String(to.getDate()).padStart(2,'0')}-${String(to.getMonth()+1).padStart(2,'0')}-${to.getFullYear()}`;

lastCalc={
name:"CHANDRAMOHAN SINGH",
reportDate:reportDate,
fromDateFormatted:fromDateFormatted,
toDateFormatted:toDateFormatted,
years:years, months:months, days:days,
principal:p, rate:r,
yearlyData:yearlyData,
monthInterest:monthInterest, dayInterest:dayInterest,
totalInterest:totalInterest, finalAmount:finalAmount
};

let detailText = "";
yearlyData.forEach(function(y){
detailText += `वर्ष ${y.year}\n\nमूलधन : ₹${inr(y.principal)}\n\nब्याज : ₹${inr(y.interest)}\n\nनया मूलधन : ₹${inr(y.newPrincipal)}\n\n`;
});
if(months>0) detailText += `${months} महीने का ब्याज : ₹${inr(monthInterest)}\n\n`;
if(days>0) detailText += `${days} दिन का ब्याज : ₹${inr(dayInterest)}\n\n`;

reportText =
`Interest Calculator Pro

Welcome, CHANDRAMOHAN SINGH

Powered by CK2026

रिपोर्ट दिनांक : ${reportDate}

____________________________

समय : ${years} वर्ष ${months} महीने ${days} दिन

मूलधन : ₹${inr(p)}

ब्याज दर : ${r}% प्रति माह

____________________________

विवरण

${detailText}
____________________________

कुल ब्याज : ₹${inr(totalInterest)}

कुल रुपये : ₹${inr(finalAmount)}

____________________________

Calculation Method
CK2026 Annual Compound Rule`;

document.getElementById("result").innerText =
`समय: ${years} वर्ष ${months} महीने ${days} दिन
कुल ब्याज: ₹${inr(totalInterest)}
कुल राशि: ₹${inr(finalAmount)}`;
}

${d.days>0 ? `<div class="ck-extra-col">${iconCircle(ICONS.calendar,30)}<div><div class="ck-extra-label">${d.days} दिन का ब्याज</div><div class="ck-extra-value">₹${inr(d.dayInterest)}</div></div></div>` : ""}

</style>

<div class="ck-frame">

${iconCircle(ICONS.calendar,32)}
<div>रिपोर्ट दिनांक<br><b>${d.reportDate}</b></div>

</div>

<div class="ck-info-col">
${iconCircle(ICONS.rupee,28)}

</div>

html2pdf().set({
margin:10,
filename:'Interest_Report_CK2026.pdf',
image:{type:'jpeg',quality:1},
html2canvas:{scale:2,useCORS:true,backgroundColor:"#ffffff"},
jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
}).from(container).save();
}

function shareWhatsApp(){
let url="https://wa.me/?text="+encodeURIComponent(reportText);
window.open(url,"_blank");
}

function saveHistory(){
localStorage.setItem("ck2026_history",reportText);
alert("History Save हो गया!");
}

// ---- PWA: service worker registration + install prompt ----
let deferredInstallPrompt=null;

if("serviceWorker" in navigator){
window.addEventListener("load",function(){
navigator.serviceWorker.register("service-worker.js").catch(function(err){
console.log("Service worker registration failed:",err);
});
});
}

window.addEventListener("beforeinstallprompt",function(e){
e.preventDefault();
deferredInstallPrompt=e;
let btn=document.getElementById("installBtn");
if(btn) btn.style.display="block";
});

function installApp(){
if(!deferredInstallPrompt){
alert("यह app पहले से install हो चुका है, या आपका browser install support नहीं करता।");
return;
}
deferredInstallPrompt.prompt();
deferredInstallPrompt.userChoice.then(function(){
deferredInstallPrompt=null;
document.getElementById("installBtn").style.display="none";
});
}

window.addEventListener("appinstalled",function(){
let btn=document.getElementById("installBtn");
if(btn) btn.style.display="none";
});

</script>
